<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepSeek 写作助手</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 16px;
        }
        
        .container {
            max-width: 400px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
        }
        
        h1 {
            font-size: 20px;
            margin-bottom: 4px;
            color: #333;
        }
        
        .subtitle {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }
        
        .badge {
            display: inline-block;
            background: #00d084;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
        }
        
        .section {
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        button {
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #00d084;
            color: white;
        }
        
        .btn-primary:hover {
            background: #00b870;
        }
        
        .btn-secondary {
            background: #e8e8e8;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #d8d8d8;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .setting {
            margin-bottom: 14px;
        }
        
        .setting label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }
        
        .setting input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
        }
        
        .setting input:focus {
            outline: none;
            border-color: #00d084;
            box-shadow: 0 0 0 3px rgba(0, 208, 132, 0.1);
        }
        
        .setting-hint {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        
        .model-select {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .model-btn {
            flex: 1;
            padding: 8px 10px;
            border: 2px solid #ddd;
            border-radius: 4px;
            background: white;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .model-btn.active {
            border-color: #00d084;
            background: #f0fdf9;
            color: #00d084;
        }
        
        .result {
            background: #f0fdf9;
            border-left: 4px solid #00d084;
            padding: 12px;
            border-radius: 4px;
            margin-top: 12px;
            font-size: 12px;
            line-height: 1.6;
            color: #333;
            max-height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .result.error {
            border-left-color: #d32f2f;
            background: #ffebee;
            color: #d32f2f;
        }
        
        .result.loading {
            border-left-color: #00d084;
            background: #f0fdf9;
            color: #666;
        }
        
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #666;
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #00d084;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .info {
            background: #e8f5e9;
            border: 1px solid #81c784;
            padding: 10px;
            border-radius: 4px;
            font-size: 11px;
            color: #2e7d32;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        
        .cost-estimate {
            background: #fff3e0;
            border: 1px solid #ffb74d;
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #e65100;
            margin-bottom: 12px;
        }
        
        .divider {
            height: 1px;
            background: #eee;
            margin: 12px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌿 DeepSeek 写作助手</h1>
        <p class="subtitle">廉价高效的 AI 写作建议</p>
        <div class="badge">💚 省钱</div>
        
        <div class="info">
            💡 选中文本后点击按钮获取建议<br>
            📊 每条建议成本 < $0.001（比 Claude 便宜 100 倍）
        </div>
        
        <div class="section">
            <div class="section-title">⚙️ 设置</div>
            <div class="setting">
                <label for="apiKey">DeepSeek API Key:</label>
                <input type="password" id="apiKey" placeholder="sk-..." />
                <div class="setting-hint">
                    📌 <a href="https://platform.deepseek.com/api_keys" target="_blank" style="color: #00d084; text-decoration: none;">获取 API Key</a> (免费获得 500 万 token 额度)
                </div>
            </div>
            
            <div class="setting">
                <label for="model">选择模型:</label>
                <div class="model-select">
                    <button class="model-btn active" onclick="selectModel('flash')">⚡ Flash<br>(快速便宜)</button>
                    <button class="model-btn" onclick="selectModel('pro')">💪 Pro<br>(更强)</button>
                </div>
                <div class="setting-hint" id="modelHint">
                    Flash: $0.14/$0.28 | Pro: $0.435/$0.87 (单位: /百万 tokens)
                </div>
            </div>
            
            <button class="btn-primary" onclick="saveSettings()" style="width: 100%;">✓ 保存设置</button>
        </div>
        
        <div class="divider"></div>
        
        <div class="section">
            <div class="section-title">📝 写作建议</div>
            <div class="button-group">
                <button class="btn-primary" onclick="checkGrammar()">✓ 语法和拼写检查</button>
                <button class="btn-secondary" onclick="improveContent()">↻ 改进内容</button>
                <button class="btn-secondary" onclick="generateText()">✎ 创意写作</button>
                <button class="btn-secondary" onclick="summarizeText()">📊 总结文本</button>
                <button class="btn-secondary" onclick="analyzeData()">📈 数据分析</button>
            </div>
        </div>
        
        <div id="result"></div>
    </div>

    <script src="deepseek_taskpane.js"></script>
</body>
</html>
